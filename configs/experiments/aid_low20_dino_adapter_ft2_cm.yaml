base: ../base.yaml

experiment:
  name: aid_low20_dinov2_small
  run_name: adapter_ft2_cm

data:
  dataset_name: AID
  root: ../data/raw/AID
  image_size: 224
  train_shots_per_class: 20
  val_shots_per_class: 10
  batch_size: 8

model:
  backbone: dinov2_small
  pretrained: true
  pretrained_model_name: facebook/dinov2-small
  freeze_backbone: true
  unfreeze_last_n_blocks: 2
  unfreeze_backbone_norm: true
  token_pooling: cls_mean
  dropout: 0.1
  adapter_dim: 192
  adapter_dropout: 0.1
  use_msca: false
  use_lgfh: false
  use_agfh: false
  use_sgfh: false
  use_cosine: false
  use_amcc: false
  use_center_reg: false
  use_feature_center_reg: true
  use_proto_reg: false
  use_proto_calib: false

training:
  epochs: 60
  learning_rate: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.0
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  mix_probability: 0.0
  gradient_clip_norm: 1.0
  patience: 12
  center_loss_weight: 0.02
  center_update_momentum: 0.9
  prototype_loss_weight: 0.0
  refresh_prototypes_each_epoch: false
