base: ../base.yaml

experiment:
  name: nwpu_low20_dinov2_small
  run_name: linear

data:
  dataset_name: NWPU_RESISC45
  root: ../data/raw/NWPU_RESISC45
  image_size: 224
  train_shots_per_class: 20
  val_shots_per_class: 10
  batch_size: 16

model:
  backbone: dinov2_small
  pretrained: true
  pretrained_model_name: facebook/dinov2-small
  freeze_backbone: true
  unfreeze_last_n_blocks: 0
  dropout: 0.1
  adapter_dim: 0
  use_msca: false
  use_lgfh: false
  use_agfh: false
  use_sgfh: false
  use_cosine: false
  use_amcc: false
  use_center_reg: false
  use_feature_center_reg: false
  use_proto_reg: false
  use_proto_calib: false

training:
  epochs: 80
  learning_rate: 0.0002
  weight_decay: 0.01
  label_smoothing: 0.0
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  mix_probability: 0.0
  gradient_clip_norm: 1.0
  patience: 15
  center_loss_weight: 0.0
  prototype_loss_weight: 0.0
  refresh_prototypes_each_epoch: false
